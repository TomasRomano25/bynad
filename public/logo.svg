<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <!-- B letter stylized as chart bars -->
  <g transform="translate(40, 35)">
    <!-- Bar chart rising bars -->
    <rect x="8" y="90" width="18" height="40" rx="4" fill="rgba(255,255,255,0.3)"/>
    <rect x="34" y="65" width="18" height="65" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="60" y="40" width="18" height="90" rx="4" fill="rgba(255,255,255,0.7)"/>
    <rect x="86" y="15" width="18" height="115" rx="4" fill="rgba(255,255,255,0.9)"/>
    <!-- Upward trend line -->
    <polyline points="17,85 43,60 69,35 95,10" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arrow tip -->
    <polygon points="95,10 85,18 92,20" fill="white"/>
  </g>
</svg>
